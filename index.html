<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FNTPS - Family Nutrition Tracking and Planning System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="header-left">
            <div class="logo">
                <span>FNTPS</span>
            </div>
        </div>
        <div class="header-right">
            <input type="text" class="search-bar" placeholder="food database">
            <button class="auth-btn">Login</button>
            <button class="auth-btn signup-btn">Sign up</button>
        </div>
    </header>
    <main>
        <h1>Welcome to FNTPS!</h1>
        <p class="subtitle">The Family Nutrition Tracking and Plannig System</p>
        <p class="description">Track you and your family's nutrition, manage shopping list and meals and more!</p>
        <button class="main-btn">Sign up</button>
        <p class="login-link">Already have an account? <a href="#">Login</a></p>
    </main>
</body>
</html>
